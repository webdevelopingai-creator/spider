<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cinematic Spider-Man themed full-screen background with 3D parallax effects and floating particles.">
  <title>Spider-Man | Cinematic Background</title>
  <link rel="stylesheet" href="bg.css">
</head>
<body>

  <!-- ===== FULL-SCREEN CINEMATIC BACKGROUND ===== -->
  <div class="spiderman-bg" id="spidermanBg">

    <!-- Layer 1: Base Background Image -->
    <div class="bg-layer bg-image" id="bgImage">
      <img src="spider-hero-bg.png" alt="Spider-Man" id="heroImg">
    </div>

    <!-- Layer 2: Cinematic Dark Gradient Overlay -->
    <div class="bg-layer bg-gradient-overlay"></div>

    <!-- Layer 3: Red & Blue Glow Edges -->
    <div class="bg-layer bg-glow-edges"></div>

    <!-- Layer 4: Animated Vignette -->
    <div class="bg-layer bg-vignette"></div>

    <!-- Layer 5: Web Pattern Overlay -->
    <div class="bg-layer bg-web-pattern" id="bgWebPattern"></div>

    <!-- Layer 6: Floating Particles -->
    <canvas class="bg-layer bg-particles" id="particlesCanvas"></canvas>

    <!-- Layer 7: Scanline Effect -->
    <div class="bg-layer bg-scanlines"></div>

    <!-- Layer 8: Noise Grain -->
    <div class="bg-layer bg-noise"></div>

  </div>

  <script src="bg.js"></script>
</body>
</html>
